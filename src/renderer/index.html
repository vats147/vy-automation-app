<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
    <title>Vy - Task Automation & Workflow Recording</title>
    
    <!-- App icon -->
    <link rel="icon" type="image/png" href="../assets/icon.png">
    
    <!-- Meta information -->
    <meta name="description" content="Vy - Comprehensive task automation and workflow recording application">
    <meta name="author" content="Vy Automation">
    
    <!-- Prevent text selection on UI elements -->
    <style>
        /* Prevent text selection on UI elements but allow in content areas */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* Allow text selection in specific content areas */
        .selectable-text,
        input,
        textarea,
        [contenteditable],
        .workflow-step-content,
        .code-content,
        .log-content {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        
        /* Loading screen styles */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        .loading-text {
            color: #6b7280;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
        }
        
        .loading-subtext {
            color: #9ca3af;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Hide loading screen when app is ready */
        body.app-ready .loading-screen {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-out;
        }
        
        /* App container initially hidden */
        #root {
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }
        
        body.app-ready #root {
            opacity: 1;
        }
        
        /* Platform-specific styles */
        .platform-darwin .titlebar-drag-region {
            /* macOS specific titlebar styles */
            height: 28px;
        }
        
        .platform-win32 .window-controls {
            /* Windows specific window control styles */
            display: flex;
        }
        
        .platform-linux .app-menu {
            /* Linux specific menu styles */
            display: block;
        }
        
        /* Electron window controls area (for frameless windows) */
        .titlebar-drag-region {
            -webkit-app-region: drag;
        }
        
        .titlebar-no-drag {
            -webkit-app-region: no-drag;
        }
        
        /* Scrollbar styles for webkit browsers */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background-color: rgba(155, 155, 155, 0.5);
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: content-box;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(155, 155, 155, 0.7);
        }
        
        ::-webkit-scrollbar-corner {
            background: transparent;
        }
        
        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .loading-screen {
                background-color: white;
                color: black;
            }
            
            .loading-spinner {
                border-color: #000;
                border-top-color: #666;
            }
        }
        
        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            .loading-spinner {
                animation: none;
            }
            
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Loading screen -->
    <div class="loading-screen" id="loadingScreen">
        <svg class="loading-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Simple logo placeholder -->
            <circle cx="50" cy="50" r="45" stroke="#3b82f6" stroke-width="4" fill="none"/>
            <path d="M30 40 L45 55 L70 30" stroke="#3b82f6" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        
        <div class="loading-spinner"></div>
        
        <div class="loading-text">
            <div>Vy Automation</div>
            <div class="loading-subtext">Initializing workflow engine...</div>
        </div>
    </div>
    
    <!-- Main app container -->
    <div id="root"></div>
    
    <!-- Error fallback -->
    <div id="errorFallback" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
        <h2 style="color: #dc2626; margin-bottom: 1rem;">Application Error</h2>
        <p style="color: #6b7280; margin-bottom: 1rem;">Something went wrong while loading the application.</p>
        <button onclick="window.location.reload()" style="padding: 0.5rem 1rem; background-color: #3b82f6; color: white; border: none; border-radius: 0.375rem; cursor: pointer;">
            Reload Application
        </button>
    </div>
    
    <script>
        // Platform detection
        if (window.electronAPI?.appInfo?.platform) {
            document.body.classList.add('platform-' + window.electronAPI.appInfo.platform);
        }
        
        // App initialization
        let appLoadTimeout;
        
        function hideLoadingScreen() {
            document.body.classList.add('app-ready');
            clearTimeout(appLoadTimeout);
        }
        
        function showErrorFallback() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('errorFallback').style.display = 'block';
        }
        
        // Auto-hide loading screen after maximum wait time
        appLoadTimeout = setTimeout(() => {
            if (!document.body.classList.contains('app-ready')) {
                console.warn('App took too long to load, showing error fallback');
                showErrorFallback();
            }
        }, 15000);
        
        // Listen for app ready signal
        window.addEventListener('DOMContentLoaded', () => {
            // Give React a moment to render
            setTimeout(hideLoadingScreen, 1000);
        });
        
        // Global error handling
        window.addEventListener('error', (event) => {
            console.error('Global error:', event.error);
            if (!document.body.classList.contains('app-ready')) {
                showErrorFallback();
            }
        });
        
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled promise rejection:', event.reason);
        });
        
        // Development helpers
        if (window.electronAPI?.environment?.isDevelopment) {
            console.log('Vy Automation - Development Mode');
            console.log('Platform:', window.electronAPI?.appInfo?.platform);
            console.log('Electron:', window.electronAPI?.appInfo?.electronVersion);
            console.log('Node:', window.electronAPI?.appInfo?.nodeVersion);
            console.log('Chrome:', window.electronAPI?.appInfo?.chromeVersion);
        }
    </script>
</body>
</html>
